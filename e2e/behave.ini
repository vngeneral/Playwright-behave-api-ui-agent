[behave]
# ── Feature / step discovery ──────────────────────────────────────────────
# Paths relative to the e2e/ directory
paths         = features
step_paths    = steps

# ── sys.path setup ───────────────────────────────────────────────────────
# Adds e2e/ itself (.) and the repo root (..) so all imports resolve:
#   from utils.api.vehicle_client import …  →  e2e/utils/api/vehicle_client.py
#   from utils.logger import …              →  root utils/logger.py
#   from helpers.constants.…               →  root helpers/
#   from agent.ai.selector_healer import … →  root agent/ai/selector_healer.py
pythonpath    = . ..

# ── Formatters ──────────────────────────────────────────────────────────
# Default to pretty output; override at CLI with -f/--format
format        = pretty

# ── Output control ───────────────────────────────────────────────────────
no_capture    = true       # print step output immediately (not buffered)
show_timings  = true

# ── Tags (default: run everything unless CLI overrides) ──────────────────
# Uncomment to exclude work-in-progress scenarios from regular runs:
# tags = not @wip

# ── Summary ──────────────────────────────────────────────────────────────
summary       = true
